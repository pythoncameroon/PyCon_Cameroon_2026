# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - name: Deploy preview channel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PYCONCAMEROON26 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          channel="pr-${{ github.event.pull_request.number }}"
          set +e
          output=$(npx firebase-tools hosting:channel:deploy "$channel" \
            --project pyconcameroon26 --expires 30d --json 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ]; then
            if echo "$output" | grep -q "is the current active version"; then
              echo "Preview already up to date (build identical to active version); treating as success."
              exit 0
            fi
            exit $status
          fi
